
<h1>🛒 Online Mart Products</h1>

<div id="productContainer" style="display:flex; flex-wrap:wrap; gap:10px;"></div>

<script>
const items = ["Shirt", "Pant", "Shoes", "Phone", "Toy", "Watch", "Bag", "Cap"];
const colors = ["Red", "Blue", "Black", "White", "Green", "Yellow"];

const images = {
  Shirt: "https://via.placeholder.com/150?text=Shirt",
  Pant: "https://via.placeholder.com/150?text=Pant",
  Shoes: "https://via.placeholder.com/150?text=Shoes",
  Phone: "https://via.placeholder.com/150?text=Phone",
  Toy: "https://via.placeholder.com/150?text=Toy",
  Watch: "https://via.placeholder.com/150?text=Watch",
  Bag: "https://via.placeholder.com/150?text=Bag",
  Cap: "https://via.placeholder.com/150?text=Cap"
};

let container = document.getElementById("productContainer");

for (let i = 0; i < 120; i++) {
    let item = items[i % items.length];
    let color = colors[i % colors.length];

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; width:180px; text-align:center;">
        <img src="${images[item]}" width="150" height="150">
        <h3>${color} ${item}</h3>
        <p>Price: Rs ${500 + i * 10}</p>
        <button>Add to Cart</button>
      </div>
    `;
}
</script>
